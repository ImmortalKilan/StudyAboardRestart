<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留学重开模拟器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <section id="start-screen" class="screen active">
      <div class="start-center">
        <h1 class="start-title">留学重开模拟器</h1>
        <p class="start-sub">这垃圾留学，一秒也不想学了！</p>
        <button id="btn-start" class="start-btn">&#x21BB; 立即重开</button>
      </div>
    </section>

    <section id="talent-screen" class="screen">
      <header class="screen-head">
        <h1>留学重开</h1>
        <p class="sub">你即将推翻现在的人生，重新从 15 岁开始。先决定你是谁。</p>
      </header>

      <div class="sex-row">
        <button id="sex-male" class="chip active">男</button>
        <button id="sex-female" class="chip">女</button>
      </div>

      <h2 class="section-title">抽取天赋 <span class="hint">选 3 个</span></h2>
      <div id="talent-list" class="talent-grid"></div>

      <div class="footer-actions">
        <button id="talent-confirm" class="primary" disabled>确认天赋</button>
      </div>
    </section>

    <section id="alloc-screen" class="screen">
      <header class="screen-head">
        <h1>分配属性</h1>
        <p class="sub">总共 <strong>25</strong> 点，单项上限 10。快乐不参与分配（局内默认 5）。</p>
      </header>

      <div class="alloc-banner">剩余点数 <span id="alloc-remaining">25</span></div>

      <div id="talent-bonus-banner" class="talent-bonus-banner" style="display:none;"></div>

      <div class="alloc-list">
        <div class="alloc-row"><span>社交</span><button class="step" id="minus-SOC">−</button><span class="alloc-val" id="alloc-SOC">0</span><button class="step" id="plus-SOC">＋</button><span class="alloc-bonus" id="bonus-SOC"></span></div>
        <div class="alloc-row"><span>智力</span><button class="step" id="minus-INT">−</button><span class="alloc-val" id="alloc-INT">0</span><button class="step" id="plus-INT">＋</button><span class="alloc-bonus" id="bonus-INT"></span></div>
        <div class="alloc-row"><span>家境</span><button class="step" id="minus-MNY">−</button><span class="alloc-val" id="alloc-MNY">0</span><button class="step" id="plus-MNY">＋</button><span class="alloc-bonus" id="bonus-MNY"></span></div>
        <div class="alloc-row"><span>健康</span><button class="step" id="minus-HLT">−</button><span class="alloc-val" id="alloc-HLT">0</span><button class="step" id="plus-HLT">＋</button><span class="alloc-bonus" id="bonus-HLT"></span></div>
        <div class="alloc-row"><span>毅力</span><button class="step" id="minus-PER">−</button><span class="alloc-val" id="alloc-PER">0</span><button class="step" id="plus-PER">＋</button><span class="alloc-bonus" id="bonus-PER"></span></div>
        <div class="alloc-row"><span>颜值</span><button class="step" id="minus-APP">−</button><span class="alloc-val" id="alloc-APP">0</span><button class="step" id="plus-APP">＋</button><span class="alloc-bonus" id="bonus-APP"></span></div>
      </div>

      <div class="footer-actions">
        <button id="alloc-random" class="ghost">随机分配</button>
        <button id="alloc-start" class="primary" disabled>开始留学人生</button>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <div class="game-layout">

        <aside class="left-panel">
          <div class="avatar-wrap">
            <canvas id="avatar-canvas"></canvas>
          </div>
          <div class="time-box">
            <span class="time-label">当前时间</span>
            <span id="time-display" class="time-val">15岁1个月</span>
          </div>
          <div id="stats-panel" class="stats-panel"></div>
          <div id="school-box" class="major-box" style="display:none;">
            <span class="major-label">学校</span>
            <span id="school-display" class="major-val"></span>
          </div>
          <div class="major-box">
            <span class="major-label">专业</span>
            <span id="major-display" class="major-val">未定</span>
          </div>
          <div id="profession-box" class="major-box" style="display:none;">
            <span class="major-label">职业</span>
            <span id="profession-display" class="major-val"></span>
          </div>
          <div class="major-box">
            <span class="major-label">恋爱</span>
            <span id="relationship-display" class="major-val">单身</span>
          </div>
          <div id="storyline-box" class="storyline-box" style="display:none;">
            <span class="storyline-label">隐藏剧情</span>
            <span id="storyline-display" class="storyline-val"></span>
          </div>

        </aside>

        <section class="right-panel">
          <div class="right-head">
            <h2>事件流</h2>
            <div class="right-actions">
              <button id="btn-auto-1x" class="ghost">自动播放</button>
              <button id="btn-auto-2x" class="ghost">自动播放 X2</button>
              <button id="btn-summary" class="ghost" style="display:none;">查看总结</button>
              <button id="btn-restart" class="ghost">重开</button>
            </div>
          </div>

          <div id="debut-box" class="action-banner" style="display:none;">
            <div class="banner-title-col">
              <span class="banner-title">出道</span>
              <span id="debut-stage" class="banner-stage">练习生</span>
            </div>
            <div class="banner-prob-col">
              <span class="banner-prob-label">成功率</span>
              <span id="debut-prob" class="banner-prob">--</span>
            </div>
            <div id="debut-decay-warn" class="banner-warn"></div>
            <button id="btn-try-debut" class="primary banner-btn" disabled>尝试出道</button>
          </div>

          <div id="party-box" class="action-banner" style="display:none;">
            <div class="banner-title-col">
              <span class="banner-title">转型</span>
              <span id="party-stage" class="banner-stage">局长</span>
            </div>
            <div class="banner-prob-col">
              <span class="banner-prob-label">成功率</span>
              <span id="ceo-prob" class="banner-prob">--</span>
            </div>
            <div id="ceo-decay-warn" class="banner-warn"></div>
            <button id="btn-try-ceo" class="primary banner-btn" disabled>尝试转型</button>
          </div>

          <div id="event-log" class="event-log"></div>
        </section>

      </div>
    </section>

    <section id="summary-screen" class="screen">
      <div class="summary-wrap">
        <header class="summary-head">
          <div class="summary-title-row">
            <h1 class="summary-title">人生总结</h1>
            <span id="summary-subtitle" class="summary-subtitle"></span>
          </div>
          <div class="summary-actions">
            <button id="btn-summary-back" class="ghost">返回事件流</button>
            <button id="btn-summary-restart" class="primary">再来一次</button>
          </div>
        </header>

        <div class="summary-hero">
          <div class="hero-avatar-wrap">
            <canvas id="summary-avatar" class="hero-avatar"></canvas>
            <div id="summary-hero-meta" class="hero-meta"></div>
          </div>
          <div class="sum-card sum-card-ending hero-ending">
            <div class="sum-card-label">最终结局</div>
            <div id="summary-ending" class="sum-card-body"></div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="sum-card sum-card-storylines">
            <div class="sum-card-label">走过的剧情</div>
            <div id="summary-storylines" class="sum-card-body"></div>
          </div>

          <div class="sum-card sum-card-stats">
            <div class="sum-card-label">属性峰值 vs 终值</div>
            <div id="summary-stats" class="sum-card-body"></div>
          </div>

          <div class="sum-card sum-card-talents">
            <div class="sum-card-label">所选天赋</div>
            <div id="summary-talents" class="sum-card-body"></div>
          </div>

          <div class="sum-card sum-card-meta">
            <div class="sum-card-label">人生数据</div>
            <div id="summary-meta" class="sum-card-body"></div>
          </div>

          <div class="sum-card sum-card-highlights">
            <div class="sum-card-label">高光时刻</div>
            <div id="summary-highlights" class="sum-card-body"></div>
          </div>

          <div class="sum-card sum-card-romance">
            <div class="sum-card-label">恋爱史</div>
            <div id="summary-romance" class="sum-card-body"></div>
          </div>
        </div>
      </div>
    </section>

    <div id="end-overlay" class="end-overlay">
      <div id="end-card" class="end-card">
        <div class="end-card-tag" id="end-card-tag"></div>
        <div class="end-card-text" id="end-card-text"></div>
        <div class="end-card-actions">
          <button id="btn-end-restart" class="ghost">再来一次</button>
          <button id="btn-end-summary" class="primary">查看人生总结</button>
        </div>
      </div>
    </div>

  </main>

  <script type="module" src="js/game.js"></script>
</body>
</html>
