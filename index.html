<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留学重开模拟器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <section id="start-screen" class="screen active">
      <div class="start-center">
        <h1 class="start-title">留学重开模拟器</h1>
        <p class="start-sub">这垃圾留学，一秒也不想学了！</p>
        <button id="btn-start" class="start-btn">&#x21BB; 立即重开</button>
      </div>
    </section>

    <section id="talent-screen" class="screen">
      <header class="screen-head">
        <h1>留学重开</h1>
        <p class="sub">你即将推翻现在的人生，重新从 15 岁开始。先决定你是谁。</p>
      </header>

      <div class="sex-row">
        <button id="sex-male" class="chip active">男</button>
        <button id="sex-female" class="chip">女</button>
      </div>

      <h2 class="section-title">抽取天赋 <span class="hint">选 3 个</span></h2>
      <div id="talent-list" class="talent-grid"></div>

      <div class="footer-actions">
        <button id="talent-confirm" class="primary" disabled>确认天赋</button>
      </div>
    </section>

    <section id="alloc-screen" class="screen">
      <header class="screen-head">
        <h1>分配属性</h1>
        <p class="sub">总共 <strong>20</strong> 点，单项上限 10。快乐不参与分配（局内默认 5）。</p>
      </header>

      <div class="alloc-banner">剩余点数 <span id="alloc-remaining">20</span></div>

      <div class="alloc-list">
        <div class="alloc-row"><span>社交</span><button class="step" id="minus-SOC">−</button><span class="alloc-val" id="alloc-SOC">0</span><button class="step" id="plus-SOC">＋</button></div>
        <div class="alloc-row"><span>智力</span><button class="step" id="minus-INT">−</button><span class="alloc-val" id="alloc-INT">0</span><button class="step" id="plus-INT">＋</button></div>
        <div class="alloc-row"><span>家境</span><button class="step" id="minus-MNY">−</button><span class="alloc-val" id="alloc-MNY">0</span><button class="step" id="plus-MNY">＋</button></div>
        <div class="alloc-row"><span>健康</span><button class="step" id="minus-HLT">−</button><span class="alloc-val" id="alloc-HLT">0</span><button class="step" id="plus-HLT">＋</button></div>
        <div class="alloc-row"><span>毅力</span><button class="step" id="minus-PER">−</button><span class="alloc-val" id="alloc-PER">0</span><button class="step" id="plus-PER">＋</button></div>
        <div class="alloc-row"><span>颜值</span><button class="step" id="minus-APP">−</button><span class="alloc-val" id="alloc-APP">0</span><button class="step" id="plus-APP">＋</button></div>
      </div>

      <div class="footer-actions">
        <button id="alloc-random" class="ghost">随机分配</button>
        <button id="alloc-start" class="primary" disabled>开始留学人生</button>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <div class="game-layout">

        <aside class="left-panel">
          <div class="avatar-wrap">
            <canvas id="avatar-canvas"></canvas>
          </div>
          <div class="time-box">
            <span class="time-label">当前时间</span>
            <span id="time-display" class="time-val">15岁1个月</span>
          </div>
          <div id="stats-panel" class="stats-panel"></div>
          <div id="school-box" class="major-box" style="display:none;">
            <span class="major-label">学校</span>
            <span id="school-display" class="major-val"></span>
          </div>
          <div class="major-box">
            <span class="major-label">专业</span>
            <span id="major-display" class="major-val">未定</span>
          </div>
          <div id="profession-box" class="major-box" style="display:none;">
            <span class="major-label">职业</span>
            <span id="profession-display" class="major-val"></span>
          </div>
          <div class="major-box">
            <span class="major-label">恋爱</span>
            <span id="relationship-display" class="major-val">单身</span>
          </div>
          <div id="storyline-box" class="storyline-box" style="display:none;">
            <span class="storyline-label">隐藏剧情</span>
            <span id="storyline-display" class="storyline-val"></span>
          </div>
        </aside>

        <section class="right-panel">
          <div class="right-head">
            <h2>事件流</h2>
            <div class="right-actions">
              <button id="btn-auto-1x" class="ghost">自动播放</button>
              <button id="btn-auto-2x" class="ghost">自动播放 X2</button>
              <button id="btn-restart" class="ghost">重开</button>
            </div>
          </div>
          <div id="event-log" class="event-log"></div>
        </section>

      </div>
    </section>

  </main>

  <script type="module" src="js/game.js"></script>
</body>
</html>
